<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="800" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset=".5" stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#EAF4FF"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="400" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4F0E2"/><stop offset="1" stop-color="#B8E6CE"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="480" x2="1600" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9AD9B6"/><stop offset="1" stop-color="#78C99A"/>
    </linearGradient>
    <linearGradient id="hill3" x1="0" y1="580" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#62B686"/><stop offset="1" stop-color="#4AA372"/>
    </linearGradient>
    <linearGradient id="road" x1="520" y1="900" x2="980" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/><stop offset="1" stop-color="#E8EEF8"/>
    </linearGradient>
    <linearGradient id="roof" x1="900" y1="320" x2="1120" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C9CF0"/><stop offset="1" stop-color="#5B7FDB"/>
    </linearGradient>
    <linearGradient id="house" x1="900" y1="380" x2="1120" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/><stop offset="1" stop-color="#F3F6FC"/>
    </linearGradient>
  </defs>

  <!-- Soft sky — open upper area for copy -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Fintech accents (subtle) -->
  <g opacity=".38" stroke="#C4B5FD" fill="none">
    <circle cx="150" cy="160" r="100" stroke-width="1.6"/>
    <circle cx="150" cy="160" r="68" stroke-width="1.2" stroke="#A78BFA"/>
    <circle cx="150" cy="160" r="38" stroke-width="1" stroke="#DDD6FE"/>
  </g>
  <g fill="#8B5CF6" opacity=".26">
    <circle cx="58" cy="230" r="2"/><circle cx="84" cy="210" r="1.6"/><circle cx="108" cy="236" r="1.4"/>
    <circle cx="70" cy="262" r="1.7"/><circle cx="124" cy="258" r="1.8"/><circle cx="46" cy="286" r="1.3"/>
    <circle cx="140" cy="286" r="1.5"/><circle cx="96" cy="298" r="1.7"/>
  </g>
  <g opacity=".28" stroke="#93C5FD" fill="none">
    <circle cx="1380" cy="150" r="78" stroke-width="1.4"/>
    <circle cx="1380" cy="150" r="48" stroke-width="1"/>
  </g>

  <!-- Clouds -->
  <g fill="#FFFFFF" opacity=".92">
    <ellipse cx="360" cy="108" rx="56" ry="18"/><ellipse cx="398" cy="100" rx="34" ry="14"/><ellipse cx="328" cy="104" rx="26" ry="12"/>
    <ellipse cx="760" cy="88" rx="64" ry="16"/><ellipse cx="804" cy="82" rx="32" ry="12"/>
    <ellipse cx="1120" cy="112" rx="48" ry="14"/><ellipse cx="1154" cy="106" rx="26" ry="10"/>
  </g>

  <!-- City skyline — mid-back, left of house -->
  <g fill="#BFDBFE" opacity=".8">
    <rect x="520" y="300" width="24" height="74" rx="3"/>
    <rect x="550" y="274" width="32" height="100" rx="3"/>
    <rect x="588" y="288" width="20" height="86" rx="3"/>
    <rect x="614" y="260" width="38" height="114" rx="3"/>
    <rect x="658" y="284" width="22" height="90" rx="3"/>
    <rect x="686" y="248" width="34" height="126" rx="3"/>
    <rect x="726" y="276" width="26" height="98" rx="3"/>
  </g>
  <g fill="#93C5FD" opacity=".4">
    <rect x="558" y="286" width="5" height="7" rx="1"/><rect x="568" y="286" width="5" height="7" rx="1"/>
    <rect x="624" y="274" width="5" height="7" rx="1"/><rect x="634" y="274" width="5" height="7" rx="1"/>
    <rect x="696" y="262" width="5" height="7" rx="1"/><rect x="706" y="262" width="5" height="7" rx="1"/>
  </g>

  <!-- Hills -->
  <path d="M0 420 C200 366 360 386 540 404 C780 428 940 352 1180 388 C1340 412 1480 392 1600 380 L1600 900 L0 900 Z" fill="url(#hill1)"/>
  <path d="M0 490 C240 434 420 464 620 486 C860 512 1020 440 1260 480 C1400 504 1500 490 1600 482 L1600 900 L0 900 Z" fill="url(#hill2)"/>
  <path d="M0 580 C280 526 460 558 700 584 C960 614 1140 550 1600 594 L1600 900 L0 900 Z" fill="url(#hill3)"/>

  <!-- Road curves toward house; starts under copy area -->
  <path d="M480 900 C520 800 580 720 680 660 C800 590 900 560 1020 550 C1100 542 1180 555 1240 590"
        stroke="#D4DEEF" stroke-width="52" stroke-linecap="round" opacity=".9"/>
  <path d="M480 900 C520 800 580 720 680 660 C800 590 900 560 1020 550 C1100 542 1180 555 1240 590"
        stroke="url(#road)" stroke-width="32" stroke-linecap="round"/>
  <path d="M480 900 C520 800 580 720 680 660 C800 590 900 560 1020 550 C1100 542 1180 555 1240 590"
        stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="8 14" opacity=".65"/>

  <!-- Trees left (under/near copy, soft) -->
  <g>
    <rect x="90" y="520" width="10" height="50" rx="3" fill="#3D6B4F"/>
    <ellipse cx="95" cy="502" rx="28" ry="26" fill="#4ADE80"/>
    <ellipse cx="76" cy="516" rx="16" ry="14" fill="#6EE7B7"/>
    <rect x="210" y="548" width="8" height="38" rx="3" fill="#3D6B4F"/>
    <ellipse cx="214" cy="534" rx="20" ry="18" fill="#34D399"/>
    <rect x="320" y="562" width="7" height="32" rx="2" fill="#3D6B4F"/>
    <ellipse cx="323" cy="550" rx="16" ry="14" fill="#4ADE80"/>
  </g>

  <!-- Trees right of house -->
  <g>
    <rect x="1380" y="510" width="10" height="46" rx="3" fill="#3D6B4F"/>
    <ellipse cx="1385" cy="492" rx="24" ry="22" fill="#34D399"/>
    <ellipse cx="1366" cy="506" rx="14" ry="12" fill="#6EE7B7"/>
    <rect x="1488" y="540" width="8" height="36" rx="2" fill="#3D6B4F"/>
    <ellipse cx="1492" cy="526" rx="18" ry="16" fill="#4ADE80"/>
  </g>

  <!-- House — right mid (under form area) -->
  <g transform="translate(980,318)">
    <ellipse cx="120" cy="248" rx="150" ry="16" fill="#166534" opacity=".15"/>
    <rect x="24" y="78" width="210" height="152" rx="8" fill="url(#house)" stroke="#D4DEEF" stroke-width="1.8"/>
    <rect x="-26" y="118" width="70" height="112" rx="7" fill="#FAFCFF" stroke="#D4DEEF" stroke-width="1.6"/>
    <rect x="198" y="138" width="82" height="92" rx="6" fill="#F8FAFC" stroke="#D4DEEF" stroke-width="1.6"/>
    <rect x="212" y="158" width="54" height="58" rx="4" fill="#E2E8F0"/>
    <path d="M8 86 L129 22 L250 86 Z" fill="url(#roof)"/>
    <rect x="16" y="80" width="228" height="9" rx="3" fill="#5B7FDB"/>
    <rect x="206" y="34" width="14" height="36" rx="2" fill="#8B5CF6"/>
    <rect x="54" y="110" width="46" height="38" rx="5" fill="#BFDBFE"/>
    <rect x="118" y="110" width="46" height="38" rx="5" fill="#BFDBFE"/>
    <rect x="182" y="110" width="30" height="38" rx="5" fill="#DDD6FE"/>
    <rect x="-12" y="146" width="34" height="30" rx="4" fill="#BFDBFE"/>
    <line x1="77" y1="110" x2="77" y2="148" stroke="#EEF5FF" stroke-width="1.4"/>
    <line x1="54" y1="129" x2="100" y2="129" stroke="#EEF5FF" stroke-width="1.4"/>
    <rect x="120" y="164" width="40" height="66" rx="5" fill="#0F2A66"/>
    <circle cx="150" cy="198" r="2.6" fill="#FBBF24"/>
    <rect x="44" y="158" width="164" height="3.5" rx="2" fill="#C4B5FD"/>
    <rect x="36" y="226" width="186" height="4.5" rx="2" fill="#E2E8F0"/>
  </g>

  <!-- Couple LEFT-CENTER so they sit in the gap between copy and form -->
  <g transform="translate(560,530)">
    <ellipse cx="78" cy="152" rx="82" ry="11" fill="#14532D" opacity=".16"/>

    <!-- Man -->
    <g transform="translate(8,6)">
      <rect x="22" y="104" width="12" height="40" rx="6" fill="#0F2A66"/>
      <rect x="42" y="104" width="12" height="40" rx="6" fill="#0F2A66"/>
      <ellipse cx="28" cy="144" rx="8.5" ry="4" fill="#0B1F4A"/>
      <ellipse cx="48" cy="144" rx="8.5" ry="4" fill="#0B1F4A"/>
      <rect x="18" y="44" width="40" height="64" rx="14" fill="#7DD3FC"/>
      <rect x="18" y="44" width="40" height="15" rx="8" fill="#38BDF8"/>
      <rect x="6" y="52" width="12" height="40" rx="6" fill="#7DD3FC"/>
      <rect x="58" y="52" width="12" height="40" rx="6" fill="#7DD3FC"/>
      <circle cx="38" cy="26" r="16" fill="#E8B86D"/>
      <path d="M22 24 C24 10 52 10 54 26 C45 18 32 18 22 24Z" fill="#0F2A66"/>
    </g>

    <!-- Woman -->
    <g transform="translate(74,10)">
      <rect x="20" y="102" width="11" height="38" rx="5.5" fill="#0F2A66"/>
      <rect x="38" y="102" width="11" height="38" rx="5.5" fill="#0F2A66"/>
      <ellipse cx="25" cy="140" rx="8" ry="3.8" fill="#0B1F4A"/>
      <ellipse cx="44" cy="140" rx="8" ry="3.8" fill="#0B1F4A"/>
      <path d="M14 50 C14 38 56 38 56 52 L52 108 C52 118 18 118 18 108 Z" fill="#2DD4BF"/>
      <path d="M14 50 C14 42 56 42 56 52 L54 68 L16 68 Z" fill="#14B8A6"/>
      <rect x="2" y="54" width="12" height="36" rx="6" fill="#5EEAD4"/>
      <rect x="56" y="54" width="12" height="36" rx="6" fill="#5EEAD4"/>
      <circle cx="35" cy="26" r="15" fill="#E8B86D"/>
      <path d="M19 28 C21 12 50 12 52 30 C43 22 29 22 19 28Z" fill="#7C3AED"/>
      <path d="M19 30 C17 42 21 52 25 54" stroke="#7C3AED" stroke-width="6.5" stroke-linecap="round"/>
      <rect x="62" y="64" width="18" height="22" rx="4" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.6"/>
      <path d="M66 64 C66 55 76 55 76 64" stroke="#7C3AED" stroke-width="1.6" fill="none"/>
    </g>
  </g>
</svg>
